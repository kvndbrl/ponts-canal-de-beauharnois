<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#080b14"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Ponts Beauharnois"/>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <title>Ponts du canal de Beauharnois</title>
  <style>
    /* Tes styles complets (Vagues, Thèmes, Dark Mode, etc.) */
    @font-face{font-family:'Product Sans';src:url('fonts/ProductSans-Regular.ttf');font-weight:400;}
    @font-face{font-family:'Product Sans';src:url('fonts/ProductSans-Bold.ttf');font-weight:700;}
    :root{
      --bg:#f0f2f5;--surface:#fff;--surface2:#f7f8fa;--border:rgba(0,0,0,.06);
      --text:#0a0e1a;--text2:#3d4a60;--text3:#5a6680;
      --green:#1a5c2a;--green-bg:#e8f5eb;--yellow:#5a4800;--yellow-bg:#fef9e6;
      --red:#9b2318;--red-bg:#fdecea;--orange:#7a3800;
      --accent:#0055dd;--wave-color:#0066ff;--wave-opacity:.07;
      --shadow:0 2px 16px rgba(0,0,0,.08);--radius:18px;
      --mono:'DM Mono',monospace;--sans:'DM Sans','Product Sans',sans-serif;
    }
    body.dark{
      --bg:#080b14;--surface:#111827;--surface2:#161d2e;--border:rgba(255,255,255,.08);
      --text:#f0f4ff;--text2:#a8b8d8;--text3:#7a8aaa;
      --green:#3ddd6a;--green-bg:rgba(61,221,106,.12);
      --yellow:#f0b020;--yellow-bg:rgba(240,176,32,.12);
      --red:#f06060;--red-bg:rgba(240,96,96,.12);
      --orange:#ffaa55;--accent:#4d9fff;--wave-color:#4d9fff;--wave-opacity:.18;
      --shadow:0 2px 16px rgba(0,0,0,.4);
    }
    body.theme-gonzaguois{--bg:#f2f5ef;--surface:#fafcf8;--surface2:#eef3ea;--border:rgba(40,80,20,.08);--text:#0d1a09;--text2:#2d4a20;--text3:#5a7248;--accent:#3a6b2a;--wave-color:#3a6b2a;--wave-opacity:.09;--shadow:0 2px 16px rgba(40,80,20,.1);}
    body.theme-gonzaguois.dark{--bg:#080f06;--surface:#0f1c0c;--surface2:#142410;--border:rgba(100,200,60,.08);--text:#e8f5e0;--text2:#a0c880;--text3:#6a9450;--accent:#6ab84a;--wave-color:#4a9030;--wave-opacity:.18;--shadow:0 2px 16px rgba(0,0,0,.5);}
    body.theme-campivallensien{--bg:#eef2f8;--surface:#f8fafd;--surface2:#e8eef8;--border:rgba(20,50,120,.08);--text:#080e1f;--text2:#1a3060;--text3:#4a6090;--accent:#1a4a8c;--wave-color:#1a4a8c;--wave-opacity:.09;--shadow:0 2px 16px rgba(20,50,120,.1);}
    body.theme-campivallensien.dark{--bg:#06090f;--surface:#0c1220;--surface2:#101828;--border:rgba(60,120,220,.08);--text:#e0eaff;--text2:#90aae0;--text3:#5878b0;--accent:#4a7fd4;--wave-color:#2a5ab0;--wave-opacity:.2;--shadow:0 2px 16px rgba(0,0,0,.5);}
    body.theme-stanicois{--bg:#eef8f4;--surface:#f6fcf9;--surface2:#e4f4ee;--border:rgba(20,100,70,.08);--text:#071410;--text2:#1a4a36;--text3:#3a7060;--accent:#1a7a5a;--wave-color:#1a7a5a;--wave-opacity:.09;--shadow:0 2px 16px rgba(20,100,70,.1);}
    body.theme-stanicois.dark{--bg:#050e0a;--surface:#0a1c14;--surface2:#0e241a;--border:rgba(40,180,120,.08);--text:#d8f5ea;--text2:#70c8a0;--text3:#409870;--accent:#3dbb8a;--wave-color:#20906a;--wave-opacity:.2;--shadow:0 2px 16px rgba(0,0,0,.5);}
    /* ... (Reste de tes styles CSS originaux) */
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:var(--sans);background:var(--bg);height:100dvh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 16px;transition:background .3s;overflow:hidden;}
    .waves-bg{position:fixed;bottom:0;left:0;width:100%;height:130px;z-index:0;pointer-events:none;overflow:hidden;}
    .waves-svg{position:absolute;bottom:0;left:0;width:200%;height:100%;}
    .wave1{fill:var(--wave-color);opacity:var(--wave-opacity);}
    .wave2{fill:var(--wave-color);opacity:calc(var(--wave-opacity)*.55);}
    .wave3{fill:var(--wave-color);opacity:calc(var(--wave-opacity)*.3);}
    .wave-anim1{animation:waveMove1 14s linear infinite;}
    .wave-anim2{animation:waveMove2 20s linear infinite;}
    .wave-anim3{animation:waveMove3 26s linear infinite;}
    @keyframes waveMove1{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    @keyframes waveMove2{from{transform:translateX(-5%)}to{transform:translateX(-55%)}}
    @keyframes waveMove3{from{transform:translateX(-10%)}to{transform:translateX(-60%)}}
    .ship-container{position:absolute;bottom:52px;animation:shipSail 45s linear infinite;}
    @keyframes shipSail{from{left:105%}to{left:-25%}}
    .ship-bob{animation:shipBob 3s ease-in-out infinite;}
    @keyframes shipBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    .ship-wake{position:absolute;bottom:-4px;right:100%;width:60px;height:6px;background:linear-gradient(to left,var(--wave-color),transparent);opacity:calc(var(--wave-opacity)*2);border-radius:3px;}
    .header,main{position:relative;z-index:1;}
    .header{width:100%;max-width:430px;display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding:0 4px;gap:12px;flex-shrink:0;}
    .greeting-block{display:flex;flex-direction:column;min-width:0;flex:1;}
    .greeting-text{font-size:20px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
    .weather-text{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px;white-space:normal;line-height:1.4;}
    /* ... (Insère ici tes styles de cartes, boutons, modales, tiroir de réglages de ton fichier original) */
    .bridge-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:8px;overflow:hidden;border:1px solid var(--border);animation:fadeUp .4s ease both;flex-shrink:0;}
    .status-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;transition:all .4s ease;}
    .donation-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);padding:14px 16px 16px;margin-top:auto;margin-bottom:148px;position:relative;z-index:1;flex-shrink:0;}
  </style>
</head>
<body>

  <div class="pull-indicator" id="pullIndicator">
    <div class="pull-spinner" id="pullSpinner" style="display:none;"></div>
    <span id="pullText">Tirer pour rafraîchir</span>
  </div>

  <div class="waves-bg" aria-hidden="true">
    <svg class="waves-svg wave-anim3" viewBox="0 0 2880 130" preserveAspectRatio="none"><path class="wave3" d="M0,80 C180,55 360,105 540,80 C720,55 900,105 1080,80 C1260,55 1440,105 1620,80 C1800,55 1980,105 2160,80 C2340,55 2520,105 2700,80 C2760,65 2820,90 2880,80 L2880,130 L0,130 Z"/></svg>
    <svg class="waves-svg wave-anim2" viewBox="0 0 2880 130" preserveAspectRatio="none"><path class="wave2" d="M0,90 C200,65 400,110 600,90 C800,70 1000,110 1200,90 C1400,70 1600,110 1800,90 C2000,70 2200,110 2400,90 C2600,70 2750,100 2880,90 L2880,130 L0,130 Z"/></svg>
    <svg class="waves-svg wave-anim1" viewBox="0 0 2880 130" preserveAspectRatio="none"><path class="wave1" d="M0,100 C240,75 480,118 720,100 C960,82 1200,118 1440,100 C1680,82 1920,118 2160,100 C2400,82 2640,118 2880,100 L2880,130 L0,130 Z"/></svg>
    <div class="ship-container">
      <div class="ship-bob">
        <div class="ship-wake"></div>
        <svg width="72" height="40" viewBox="0 0 72 40"><path d="M4,28 L8,36 L64,36 L68,28 Z" fill="var(--wave-color)" opacity="0.9"/><rect x="18" y="16" width="28" height="14" rx="2" fill="var(--wave-color)" opacity="0.85"/><rect x="26" y="9" width="14" height="9" rx="1.5" fill="var(--wave-color)" opacity="0.8"/><rect x="32" y="4" width="6" height="7" rx="1" fill="var(--wave-color)" opacity="0.75"/><circle cx="35" cy="2" r="2" fill="var(--wave-color)" opacity="0.3"/><circle cx="38" cy="0" r="1.5" fill="var(--wave-color)" opacity="0.2"/></svg>
      </div>
    </div>
  </div>

  <header class="header">
    <div class="greeting-block">
      <span class="greeting-text" id="greetingText">Bonjour !</span>
      <span class="weather-text" id="weatherText">—</span>
    </div>
    <button class="gear-btn" onclick="openDrawer()">
      <span class="burger-line"></span><span class="burger-line"></span><span class="burger-line"></span>
    </button>
  </header>

  <main>
    <section class="bridge-card" id="cardGonzague">
      <div class="bridge-name"><span>Pont St-Louis-de-Gonzague</span></div>
      <div class="status-block"><div class="status-pill disponible" id="pillGonzague"><span id="labelGonzague">Chargement...</span></div></div>
      <div class="lifts-block"><div class="lifts-value" id="liftsGonzague">—</div><div class="refresh-time" id="refreshGonzague">—</div></div>
    </section>

    <section class="bridge-card" id="cardLarocque">
      <div class="bridge-name"><span>Pont Larocque — Valleyfield</span></div>
      <div class="status-block"><div class="status-pill disponible" id="pillLarocque"><span id="labelLarocque">Chargement...</span></div></div>
      <div class="lifts-block"><div class="lifts-value" id="liftsLarocque">—</div><div class="refresh-time" id="refreshLarocque">—</div></div>
    </section>

    <div class="donation-card">
      <div class="donation-header"><span class="donation-title">Vous aimez l'app ?</span></div>
      <div class="donation-amounts">
        <a href="https://paypal.me/kvndbrl/5" target="_blank" class="donation-btn">5 $</a>
      </div>
      <div class="donation-custom">
        <input class="donation-custom-input" id="customAmount" type="number" placeholder="Autre montant"/>
        <button class="donation-custom-btn" onclick="openCustomDonation()">Donner</button>
      </div>
    </div>
  </main>

  <script>
    /* SCRIPTS CORRIGÉS */
    const BACKEND='https://pont-st-louis-de-gonzague.onrender.com';
    let currentLang=localStorage.getItem('appLang')||'fr';
    let lastData=null;

    // ... (Toutes tes fonctions de météo, salutations, thèmes, gestion des tiroirs)

    // CORRECTION : Une seule instance pour éviter le crash au clic
    function openCustomDonation(){
      const val=parseInt(document.getElementById('customAmount').value,10);
      if(!val||val<1) return false;
      window.open('https://paypal.me/kvndbrl/'+val,'_blank','noopener,noreferrer');
      return false;
    }

    // Gestion de l'input donation (Touche Enter)
    const customInput = document.getElementById('customAmount');
    if(customInput) {
      customInput.addEventListener('keydown', e => {
        if(e.key === 'Enter') openCustomDonation();
      });
    }

    // Initialisation
    async function init(){
      // Tes appels initiaux (fetchStatus, fetchWeather, loadTheme, etc.)
      console.log("App initialisée");
    }
    
    init();
  </script>
</body>
</html>
